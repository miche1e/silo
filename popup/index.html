<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Silo - Nostr Remote Signer</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    
    body {
      width: 360px;
      min-height: 200px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0d0d0d;
      color: #e0e0e0;
      padding: 20px;
    }
    
    .header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 20px;
    }
    
    .logo {
      width: 32px;
      height: 32px;
      background: linear-gradient(135deg, #b026ff, #00f0ff);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      font-size: 18px;
    }
    
    h1 {
      font-size: 18px;
      font-weight: 600;
      background: linear-gradient(90deg, #b026ff, #00f0ff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    
    .status {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 12px;
      border-radius: 8px;
      margin-bottom: 16px;
      font-size: 14px;
    }
    
    .status.connected {
      background: rgba(57, 255, 20, 0.1);
      border: 1px solid rgba(57, 255, 20, 0.3);
      color: #39ff14;
    }
    
    .status.disconnected {
      background: rgba(255, 42, 109, 0.1);
      border: 1px solid rgba(255, 42, 109, 0.3);
      color: #ff2a6d;
    }
    
    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: currentColor;
    }
    
    .input-group {
      margin-bottom: 16px;
    }
    
    label {
      display: block;
      font-size: 12px;
      color: #888;
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    
    input[type="text"] {
      width: 100%;
      padding: 12px;
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 8px;
      color: #e0e0e0;
      font-size: 14px;
      font-family: monospace;
    }
    
    input[type="text"]:focus {
      outline: none;
      border-color: #b026ff;
      box-shadow: 0 0 0 2px rgba(176, 38, 255, 0.2);
    }
    
    input[type="text"]::placeholder {
      color: #555;
    }
    
    .btn {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
    }
    
    .btn-primary {
      background: linear-gradient(135deg, #b026ff, #9333ea);
      color: white;
    }
    
    .btn-primary:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(176, 38, 255, 0.4);
    }
    
    .btn-secondary {
      background: #333;
      color: #aaa;
      margin-top: 8px;
    }
    
    .btn-secondary:hover {
      background: #444;
    }
    
    .info {
      margin-top: 16px;
      padding: 12px;
      background: #1a1a1a;
      border-radius: 8px;
      font-size: 12px;
      color: #888;
    }
    
    .info a {
      color: #00f0ff;
      text-decoration: none;
    }
    
    .info a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">S</div>
    <h1>Silo</h1>
  </div>
  
  <div id="status" class="status disconnected">
    <div class="status-dot"></div>
    <span id="status-text">Not configured</span>
  </div>
  
  <div class="input-group">
    <label for="bunker-url">Bunker URL (bunker://...)</label>
    <input type="text" id="bunker-url" placeholder="bunker://npub..." />
  </div>
  
  <button id="connect-btn" class="btn btn-primary">Connect</button>
  <button id="disconnect-btn" class="btn btn-secondary" style="display: none;">Disconnect</button>
  
  <div class="info">
    <p>Get your bunker URL from <a href="https://nsec.app" target="_blank">nsec.app</a> or <a href="https://nostrme.com" target="_blank">nostrme.com</a></p>
  </div>
  
  <script src="popup.js"></script>
</body>
</html>
